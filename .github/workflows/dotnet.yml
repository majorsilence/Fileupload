name: .NET

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Build
      run: chmod +x ./build_linux.sh && ./build_linux.sh
    - name: Archive artifacts x64 linux
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: linux-x64
        path: |
          build/output/linux-x64
        retention-days: 1
    - name: Archive artifacts arm64 linux
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: linux-arm64
        path: |
          build/output/linux-arm64
        retention-days: 1
    - name: Archive Self Contained Debian Linux Client
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: linux-x64-client-deb
        path: |
          **/**/*.deb
        retention-days: 1

  windows-build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore FileUpload.sln
    - name: Build
      run: dotnet build FileUpload.sln --no-restore
    - name: Publish
      run: dotnet publish -c Release -r win-x64 --self-contained true --output ./build/output/win-x64
    - name: Archive artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: win-x64
        path: |
          build/output/win-x64
        retention-days: 1

  mac-build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5.2.0
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore FileUpload.sln
    - name: Build
      run: dotnet build FileUpload.sln --no-restore
    - name: Publish
      run: dotnet publish -c Release -r osx-arm64 --self-contained true --output ./build/output/osx-arm64
    - name: Archive artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: osx-arm64
        path: |
          build/output/osx-arm64
        retention-days: 1